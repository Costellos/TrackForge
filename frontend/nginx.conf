server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Proxy API requests to backend — never cache
    location /api/ {
        proxy_pass http://api:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Force no-cache headers for Cloudflare and browsers
        proxy_hide_header Cache-Control;
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header CDN-Cache-Control "no-store" always;
        add_header Cloudflare-CDN-Cache-Control "no-store" always;
    }

    # Hashed static assets (JS/CSS) — cache aggressively
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable" always;
    }

    # index.html — never cache so new deploys take effect immediately
    location = /index.html {
        add_header Cache-Control "no-cache" always;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }
}
