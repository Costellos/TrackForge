services:
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - /data/trackforge/staging:/data/trackforge/staging
      - /data/media/music:/data/media/music
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      DATABASE_URL_SYNC: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: ${SECRET_KEY}
      STAGING_PATH: /data/trackforge/staging
      LIBRARY_PATH: /data/media/music
      JELLYFIN_URL: ${JELLYFIN_URL:-}
      JELLYFIN_API_KEY: ${JELLYFIN_API_KEY:-}
      MUSICBRAINZ_CONTACT: ${MUSICBRAINZ_CONTACT:-}
      ACOUSTID_API_KEY: ${ACOUSTID_API_KEY:-}
      SLSKD_URL: ${SLSKD_URL:-}
      SLSKD_API_KEY: ${SLSKD_API_KEY:-}
      QBITTORRENT_URL: ${QBITTORRENT_URL:-}
      QBITTORRENT_USERNAME: ${QBITTORRENT_USERNAME:-}
      QBITTORRENT_PASSWORD: ${QBITTORRENT_PASSWORD:-}
      FANART_API_KEY: ${FANART_API_KEY:-}
      PROWLARR_URL: ${PROWLARR_URL:-}
      PROWLARR_API_KEY: ${PROWLARR_API_KEY:-}
      NZBGET_URL: ${NZBGET_URL:-}
      NZBGET_USERNAME: ${NZBGET_USERNAME:-}
      NZBGET_PASSWORD: ${NZBGET_PASSWORD:-}
      NZBGET_CATEGORY: ${NZBGET_CATEGORY:-music}
      DISCORD_WEBHOOK_URL: ${DISCORD_WEBHOOK_URL:-}
    networks:
      - default
      - media
    # Port 8080 not exposed to host — nginx (web) proxies to api:8080 internally
    restart: unless-stopped

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    user: "0:1000"
    command: ["arq", "trackforge.worker.settings.WorkerSettings"]
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - /data/trackforge/staging:/data/trackforge/staging
      - /data/media/music:/data/media/music
      - /data/downloads/complete/music:/data/downloads/complete/music
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      DATABASE_URL_SYNC: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: ${SECRET_KEY}
      STAGING_PATH: /data/trackforge/staging
      LIBRARY_PATH: /data/media/music
      NZBGET_COMPLETE_PATH: /data/downloads/complete/music
      PROWLARR_URL: ${PROWLARR_URL:-}
      PROWLARR_API_KEY: ${PROWLARR_API_KEY:-}
      NZBGET_URL: ${NZBGET_URL:-}
      NZBGET_USERNAME: ${NZBGET_USERNAME:-}
      NZBGET_PASSWORD: ${NZBGET_PASSWORD:-}
      NZBGET_CATEGORY: ${NZBGET_CATEGORY:-music}
      SLSKD_URL: ${SLSKD_URL:-}
      SLSKD_API_KEY: ${SLSKD_API_KEY:-}
      QBITTORRENT_URL: ${QBITTORRENT_URL:-}
      QBITTORRENT_USERNAME: ${QBITTORRENT_USERNAME:-}
      QBITTORRENT_PASSWORD: ${QBITTORRENT_PASSWORD:-}
      JELLYFIN_URL: ${JELLYFIN_URL:-}
      JELLYFIN_API_KEY: ${JELLYFIN_API_KEY:-}
      MUSICBRAINZ_CONTACT: ${MUSICBRAINZ_CONTACT:-}
      DISCORD_WEBHOOK_URL: ${DISCORD_WEBHOOK_URL:-}
    networks:
      - default
      - media
    restart: unless-stopped

  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    depends_on:
      - api
    ports:
      - "8612:80"
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    volumes:
      - pgdata:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-trackforge}
      POSTGRES_USER: ${POSTGRES_USER:-trackforge}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-trackforge}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

networks:
  media:
    external: true
    name: media-server_media

volumes:
  pgdata:
  redisdata:
